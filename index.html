    <script>
    (function(){
      var h = location.hostname;
      if (/vercel\.app|preview|deploy-preview|feature--/.test(h)) {
        var m = document.createElement('meta');
        m.name = 'robots';
        m.content = 'noindex, nofollow';
        document.head.appendChild(m);
      }
    })();
    // Restore route stored by 404.html (GitHub Pages SPA redirect trick).
    // BASE_URL is replaced by Vite at build time and matches the deploy
    // target ('/nicola-capasso-photo/' on GH Pages, '/' on Netlify).
    (function(){
      var redirect = sessionStorage.getItem('gh-pages-redirect');
      if (redirect) {
        sessionStorage.removeItem('gh-pages-redirect');
        var base = '%BASE_URL%'.replace(/\/$/, '');
        window.history.replaceState(null, '', base + redirect);
      }
    })();
  </script>
