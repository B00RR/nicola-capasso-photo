backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: # <-- Inserisci qui il tuo Cloud Name da Cloudinary
    api_key: # <-- Inserisci qui la tua API Key da Cloudinary

publish_mode: editorial_workflow

site_url: # <-- URL del sito deployato su Netlify (es. https://nicola-wedding.netlify.app)

collections:
  - name: site
    label: Impostazioni Generali
    files:
      - file: src/content/site.json
        label: Contatti, Navigazione e Footer
        fields:
          - label: Contatti
            name: contacts
            widget: object
            fields:
              - { label: WhatsApp, name: whatsapp, widget: string }
              - { label: Link WhatsApp, name: whatsappLink, widget: string }
              - { label: Instagram URL, name: instagram, widget: string }
              - { label: Instagram Handle, name: instagramHandle, widget: string }
              - { label: Email, name: email, widget: string }
          - label: Navigazione
            name: nav
            widget: object
            fields:
              - { label: Home (IT), name: home_it, widget: string }
              - { label: Home (EN), name: home_en, widget: string }
              - { label: Portfolio (IT), name: portfolio_it, widget: string }
              - { label: Portfolio (EN), name: portfolio_en, widget: string }
              - { label: Contatti (IT), name: contact_it, widget: string }
              - { label: Contatti (EN), name: contact_en, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Tagline (IT), name: tagline_it, widget: text }
              - { label: Tagline (EN), name: tagline_en, widget: text }
              - { label: Diritti (IT), name: rights_it, widget: string }
              - { label: Diritti (EN), name: rights_en, widget: string }
              - { label: Crafted (IT), name: crafted_it, widget: string }
              - { label: Crafted (EN), name: crafted_en, widget: string }
          - label: 404
            name: notFound
            widget: object
            fields:
              - { label: Titolo (IT), name: title_it, widget: string }
              - { label: Titolo (EN), name: title_en, widget: string }
              - { label: Tasto indietro (IT), name: back_it, widget: string }
              - { label: Tasto indietro (EN), name: back_en, widget: string }

  - name: home
    label: Home Page
    files:
      - file: src/content/home.json
        label: Testi Home
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow (IT), name: eyebrow_it, widget: string }
              - { label: Eyebrow (EN), name: eyebrow_en, widget: string }
              - label: Titolo (IT)
                name: title_it
                widget: list
                allow_add: true
              - label: Titolo (EN)
                name: title_en
                widget: list
                allow_add: true
              - { label: Sottotitolo (IT), name: subtitle_it, widget: text }
              - { label: Sottotitolo (EN), name: subtitle_en, widget: text }
              - { label: CTA (IT), name: cta_it, widget: string }
              - { label: CTA (EN), name: cta_en, widget: string }
              - { label: Scroll (IT), name: scroll_it, widget: string }
              - { label: Scroll (EN), name: scroll_en, widget: string }
          - label: About
            name: about
            widget: object
            fields:
              - { label: Kicker (IT), name: kicker_it, widget: string }
              - { label: Kicker (EN), name: kicker_en, widget: string }
              - { label: Titolo (IT), name: title_it, widget: text }
              - { label: Titolo (EN), name: title_en, widget: text }
              - label: Paragrafi (IT)
                name: body_it
                widget: list
                allow_add: true
                field: { widget: text }
              - label: Paragrafi (EN)
                name: body_en
                widget: list
                allow_add: true
                field: { widget: text }
              - label: Statistiche
                name: stats
                widget: list
                allow_add: true
                fields:
                  - { label: Numero, name: n, widget: string }
                  - { label: Etichetta (IT), name: l_it, widget: string }
                  - { label: Etichetta (EN), name: l_en, widget: string }
          - label: Servizi
            name: services
            widget: object
            fields:
              - { label: Kicker (IT), name: kicker_it, widget: string }
              - { label: Kicker (EN), name: kicker_en, widget: string }
              - label: Voci
                name: items
                widget: list
                allow_add: true
                fields:
                  - { label: Titolo (IT), name: t_it, widget: string }
                  - { label: Titolo (EN), name: t_en, widget: string }
                  - { label: Descrizione (IT), name: d_it, widget: text }
                  - { label: Descrizione (EN), name: d_en, widget: text }
          - label: Portfolio (Home)
            name: portfolio
            widget: object
            fields:
              - { label: Kicker (IT), name: kicker_it, widget: string }
              - { label: Kicker (EN), name: kicker_en, widget: string }
              - { label: Titolo (IT), name: title_it, widget: text }
              - { label: Titolo (EN), name: title_en, widget: text }
              - { label: Intro (IT), name: intro_it, widget: text }
              - { label: Intro (EN), name: intro_en, widget: text }
              - { label: Vedi tutto (IT), name: viewAll_it, widget: string }
              - { label: Vedi tutto (EN), name: viewAll_en, widget: string }
          - label: Marquee
            name: marquee
            widget: list
            allow_add: true

  - name: portfolio
    label: Portfolio
    files:
      - file: src/content/portfolio.json
        label: Anni e Shoots
        fields:
          - label: Anni
            name: years
            widget: list
            allow_add: true
            fields:
              - { label: Anno, name: year, widget: number }
              - { label: Didascalia (IT), name: caption_it, widget: text }
              - { label: Didascalia (EN), name: caption_en, widget: text }
              - label: Shoots
                name: shoots
                widget: list
                allow_add: true
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Titolo coppia, name: title, widget: string }
                  - { label: Location, name: location, widget: string }
                  - { label: Immagine, name: image, widget: image }
                  - label: Span
                    name: span
                    widget: select
                    options: ["normal", "tall", "wide"]
                    default: "normal"
                    required: false

  - name: contact
    label: Contatti
    files:
      - file: src/content/contact.json
        label: Testi Contatti
        fields:
          - { label: Kicker (IT), name: kicker_it, widget: string }
          - { label: Kicker (EN), name: kicker_en, widget: string }
          - { label: Titolo (IT), name: title_it, widget: text }
          - { label: Titolo (EN), name: title_en, widget: text }
          - { label: Body (IT), name: body_it, widget: text }
          - { label: Body (EN), name: body_en, widget: text }
          - { label: Citazione (IT), name: quote_it, widget: text }
          - { label: Citazione (EN), name: quote_en, widget: text }
          - label: Form
            name: form
            widget: object
            fields:
              - { label: Nome (IT), name: name_it, widget: string }
              - { label: Nome (EN), name: name_en, widget: string }
              - { label: Email (IT), name: email_it, widget: string }
              - { label: Email (EN), name: email_en, widget: string }
              - { label: Data (IT), name: date_it, widget: string }
              - { label: Data (EN), name: date_en, widget: string }
              - { label: Luogo (IT), name: location_it, widget: string }
              - { label: Luogo (EN), name: location_en, widget: string }
              - { label: Messaggio (IT), name: message_it, widget: string }
              - { label: Messaggio (EN), name: message_en, widget: string }
              - { label: Invia (IT), name: send_it, widget: string }
              - { label: Invia (EN), name: send_en, widget: string }
              - { label: Conferma (IT), name: sent_it, widget: string }
              - { label: Conferma (EN), name: sent_en, widget: string }
          - { label: Direct label (IT), name: direct_it, widget: string }
          - { label: Direct label (EN), name: direct_en, widget: string }
          - { label: WhatsApp label (IT), name: whatsapp_it, widget: string }
          - { label: WhatsApp label (EN), name: whatsapp_en, widget: string }
          - { label: Instagram label (IT), name: instagram_it, widget: string }
          - { label: Instagram label (EN), name: instagram_en, widget: string }
          - { label: Email label (IT), name: email_it, widget: string }
          - { label: Email label (EN), name: email_en, widget: string }
