<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#faf7f2;font-family:sans-serif;gap:30px;padding:40px}
.box{text-align:center}
.box h3{margin:0 0 15px;color:#333;font-weight:400;font-size:13px;letter-spacing:0.1em;text-transform:uppercase}
.box img{max-width:700px;width:95vw;height:auto;display:block;margin:0 auto}
.row{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;align-items:center}
.row img{width:140px;height:auto}
.dark{background:#1a1816!important}
.dark h3{color:#eee!important}
</style></head><body>

<div class="box"><h3>Logo Regular</h3><img src="/logo.svg"></div>
<div class="box"><h3>Logo Thin (più sottile)</h3><img src="/logo-thin.svg"></div>

<div class="row">
<div class="box"><h3>Favicon Regular</h3><img src="/favicon.svg"></div>
<div class="box"><h3>Favicon Thin</h3><img src="/favicon-thin.svg"></div>
</div>

<div class="box dark"><h3>Logo Regular — sfondo scuro</h3><img src="/logo.svg"></div>
<div class="box dark"><h3>Logo Thin — sfondo scuro</h3><img src="/logo-thin.svg"></div>

</body></html>
