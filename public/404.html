<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nicola — Wedding Photographer</title>
  <meta name="robots" content="noindex, nofollow" />
  <script>
    // GitHub Pages SPA redirect: store the intended path and redirect to root.
    // index.html then restores the path so React Router renders the right page.
    var base = '/nicola-capasso-photo';
    var path = window.location.pathname.slice(base.length) || '/';
    sessionStorage.setItem('gh-pages-redirect', path + window.location.search + window.location.hash);
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
